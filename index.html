<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloom Letter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section id="intro" class="intro">
      <div class="mark">✦</div>
      <h1>Bloom Letter</h1>
      <p class="names">Hideyuki &amp; Yuki</p>

      <p class="lead">
        皆さまのテーブルには、<br>
        私たちからの<br>
        ささやかな想いを込めた<br>
        お花が飾られています。
      </p>

      <button id="openBtn" class="button">花言葉の審議結果を見る</button>
      <div id="petals"></div>
      <p class="hint">Tap to open your flower message</p>
    </section>

    <section id="result" class="result hidden">
      <div class="card-wrap">
        <img id="flowerImage" class="flower-image" src="" alt="Bloom Letter 花言葉カード">
      </div>
      <p class="thanks">ご覧いただきありがとうございました。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
