<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloom Letter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
<div id="intro" class="intro">
<div class="mark">✦</div>
<h1>Bloom Letter</h1>
<p class="names">Hideyuki &amp; Yuki</p>
<p class="lead">
皆さまのテーブルには、<br>
私たちからの<br>
ささやかな想いを込めた<br>
お花が飾られています。
</p>
<button id="openBtn">花言葉の審議結果を見る</button>
<div id="petals"></div>
<p class="hint">Tap to open your flower message</p>
</div>

<div id="result" class="hidden">
<img id="flowerImage">
<p class="thanks">ご覧いただきありがとうございました。</p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
